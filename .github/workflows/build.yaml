name: Build SilkCodec Wrapper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build
        run: |
          sdkmanager "build-tools;34.0.0"

          # 创建源码
          mkdir -p src/me/yun/silk
          cat > src/me/yun/silk/SilkCodec.java << 'JAVASRC'
          package me.yun.silk;
          public class SilkCodec {
              static { System.loadLibrary("silk"); }
              public native int autoToSilk(String input, String output, int sampleRate);
              public native int silkToMp3(String input, String output, int sampleRate);
              public native int autoToPcm(String input, String output);
              public native int pcmToSilk(String input, String output, int sampleRate, int maxRate, int channels);
              public native int getFileType(String path);
              public native long getDuration(String path);
          }
          JAVASRC

          # 编译
          mkdir -p classes
          javac -source 8 -target 8 -Xlint:-options src/me/yun/silk/SilkCodec.java -d classes
          echo "javac OK"

          # 用 java -jar 直接调用 d8.jar
          D8_JAR=$(find $ANDROID_HOME -name "d8.jar" -type f | head -1)
          echo "d8.jar: $D8_JAR"
          java -cp "$D8_JAR" com.android.tools.r8.D8 --output dex_out classes/me/yun/silk/SilkCodec.class
          echo "d8 OK"

          # 打包
          cd dex_out
          zip -r ../SilkCodec.jar classes.dex
          cd ..
          ls -la SilkCodec.jar

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SilkCodec
          path: SilkCodec.jar
