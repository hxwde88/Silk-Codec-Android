name: Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - run: sdkmanager "build-tools;34.0.0"

      - run: >
          javac
          wrapper/src/me/yun/silk/SilkCodec.java
          -d out

      - run: >
          java
          -cp $ANDROID_HOME/build-tools/34.0.0/lib/d8.jar
          com.android.tools.r8.D8
          --output dex_out
          out/me/yun/silk/SilkCodec.class

      - run: cd dex_out && zip ../SilkCodec.jar classes.dex

      - uses: actions/upload-artifact@v4
        with:
          name: SilkCodec
          path: SilkCodec.jar
