name: Build Silk Codec

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find and copy .so files
        run: |
          mkdir -p output
          find . -name "*.so" -exec cp {} output/ \;
          find . -name "*.jar" -path "*/build/*" -exec cp {} output/ \;
          find . -name "*.aar" -path "*/build/*" -exec cp {} output/ \;
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: silk-codec-build
          path: output/

