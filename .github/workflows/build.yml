name: Build SilkCodec Wrapper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Create source
        run: |
          mkdir -p src/me/yun/silk
          cat > src/me/yun/silk/SilkCodec.java << 'EOF'
          package me.yun.silk;
          public class SilkCodec {
              static { System.loadLibrary("silk"); }
              public native int autoToSilk(String input, String output, int sampleRate);
              public native int silkToMp3(String input, String output, int sampleRate);
              public native int autoToPcm(String input, String output);
              public native int pcmToSilk(String input, String output, int sampleRate, int maxRate, int channels);
              public native int getFileType(String path);
              public native long getDuration(String path);
          }
          EOF

      - name: Compile and package DEX
        run: |
          # 编译 Java 源码
          mkdir -p classes
          javac -source 8 -target 8 -Xlint:-options src/me/yun/silk/SilkCodec.java -d classes

          # 转换为 DEX 格式
          d8 --output output classes/me/yun/silk/SilkCodec.class

          # 打包成 jar
          cd output
          zip -r ../SilkCodec.jar classes.dex
          cd ..
          ls -la SilkCodec.jar

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SilkCodec
          path: SilkCodec.jar
