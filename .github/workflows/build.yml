name: Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Build
        run: |
          sdkmanager "build-tools;34.0.0"

          mkdir -p src/me/yun/silk
          cat > src/me/yun/silk/SilkCodec.java << 'EOF'
          package me.yun.silk;
          public class SilkCodec {
              static { System.loadLibrary("silk"); }
              public native int autoToSilk(String input, String output, int sampleRate);
              public native int silkToMp3(String input, String output, int sampleRate);
              public native int autoToPcm(String input, String output);
              public native int pcmToSilk(String input, String output, int sampleRate, int maxRate, int channels);
              public native int getFileType(String path);
              public native long getDuration(String path);
          }
          EOF

          javac -source 8 -target 8 src/me/yun/silk/SilkCodec.java -d out
          java -cp $ANDROID_HOME/build-tools/34.0.0/lib/d8.jar com.android.tools.r8.D8 --output dex_out out/me/yun/silk/SilkCodec.class
          cd dex_out && zip ../SilkCodec.jar classes.dex

      - uses: actions/upload-artifact@v4
        with:
          name: SilkCodec
          path: SilkCodec.jar
